name: Chrome Extension Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'src/**'
      - 'public/**'
      - 'scripts/package-extension.ps1'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - 'postcss.config.js'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:run
      - run: npm run extension:package
      - uses: actions/upload-artifact@v4
        with:
          name: wesst-calculator-chrome-extension
          path: release-artifacts/wesst-calculator-chrome-extension.zip
          if-no-files-found: error
